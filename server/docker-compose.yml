services:
  db:
    image: postgres:17-alpine  # Use Alpine for smaller, faster images
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432" # Defaults to 5432 if DB_PORT is missing
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: